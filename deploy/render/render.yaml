      - key: SPRING_DATASOURCE_HIKARI_MAX_LIFETIME
        value: "1800000"
      - key: API_TICKET_SERVICE_URL
        value: https://passit-ticket.onrender.com
      - key: AWS_ACCESS_KEY_ID
        value: placeholder
      - key: AWS_SECRET_ACCESS_KEY
        value: placeholder
      - key: AWS_REGION
        value: ap-northeast-2
      - key: SNS_DEAL_EVENTS_TOPIC_ARN
        value: arn:aws:sns:ap-northeast-2:000000000000:deal-events
      - key: SNS_TICKET_EVENTS_TOPIC_ARN
        value: arn:aws:sns:ap-northeast-2:000000000000:ticket-events
      - key: SNS_PAYMENT_EVENTS_TOPIC_ARN
        value: arn:aws:sns:ap-northeast-2:000000000000:payment-events
      - key: SQS_TRADE_TICKET_EVENTS_QUEUE_URL
