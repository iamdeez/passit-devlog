services:
  # ─────────────────────────────────────────────
  # service-account (인증/회원)  port: 8081
  # ─────────────────────────────────────────────
  - type: web
    name: passit-account
    runtime: image
    image:
      url: ghcr.io/iamdeez/service-account:latest
    plan: free
    region: singapore
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.egiusvpctuqjkwrrhzvm
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: none
      - key: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
        value: "5"
      - key: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
        value: "1"
      - key: SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT
        value: "30000"
      - key: SPRING_DATASOURCE_HIKARI_MAX_LIFETIME
        value: "1800000"
      - key: REDIS_HOST
        value: pure-tortoise-98812.upstash.io
      - key: REDIS_PORT
        value: "6379"
      - key: REDIS_PASSWORD
        sync: false
      - key: REDIS_SSL
        value: "true"
      - key: JWT_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRATION
        value: "3600000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: KAKAO_REST_API_KEY
        sync: false
      - key: KAKAO_CLIENT_SECRET
        sync: false
      - key: KAKAO_REDIRECT_URI
        value: https://passit-account.onrender.com/api/auth/kakao/callback
      - key: AWS_ACCESS_KEY_ID
        value: placeholder
      - key: AWS_SECRET_ACCESS_KEY
        value: placeholder
      - key: AWS_REGION
        value: ap-northeast-2
      - key: SERVER_PORT
        value: "10000"
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # ─────────────────────────────────────────────
  # service-ticket (티켓 등록/조회)  port: 8082
