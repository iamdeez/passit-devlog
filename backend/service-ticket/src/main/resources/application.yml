spring:
  application:
    name: ticketservice-service
  main:
    allow-bean-definition-overriding: true

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:passit_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USER:passit_user}
    password: ${DB_PASSWORD:passit_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8082

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: ticket-service

logging:
  level:
    com.company.ticketservice: DEBUG
    org.springframework: INFO

jwt:
  secret: ${JWT_SECRET:local-dev-only-jwt-secret-change-via-env-in-production}

# AWS Configuration (환경 변수로 제공되어야 함)
aws:
  region: ${AWS_REGION:ap-northeast-2}
  sns:
    topics:
      ticket-events: ${SNS_TICKET_EVENTS_TOPIC_ARN:arn:aws:sns:ap-northeast-2:000000000000:local-ticket-events}
  sqs:
    queues:
      ticket-deal-events: ${SQS_TICKET_DEAL_EVENTS_QUEUE_URL:https://sqs.ap-northeast-2.amazonaws.com/000000000000/local-ticket-deal-events}

# 로컬 실행 시 환경 변수 미설정으로 인한 오류 방지 (코드에서 직접 참조하는 경우를 위해 추가)
SNS_TICKET_EVENTS_TOPIC_ARN: arn:aws:sns:ap-northeast-2:000000000000:local-ticket-events
SQS_TICKET_DEAL_EVENTS_QUEUE_URL: https://sqs.ap-northeast-2.amazonaws.com/000000000000/local-ticket-deal-events
