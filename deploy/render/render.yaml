      - key: SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: none
      - key: SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE
        value: "5"
      - key: SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE
        value: "1"
      - key: SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT
        value: "30000"
      - key: SPRING_DATASOURCE_HIKARI_MAX_LIFETIME
        value: "1800000"
      - key: AWS_ACCESS_KEY_ID
        value: placeholder
      - key: AWS_SECRET_ACCESS_KEY
        value: placeholder
      - key: AWS_REGION
        value: ap-northeast-2
      - key: AWS_S3_BUCKET
        value: passit-bucket
      - key: SPRING_CLOUD_AWS_SQS_ENABLED
        value: "false"
      - key: SPRING_CLOUD_AWS_SQS_LISTENER_AUTO_STARTUP
        value: "false"
      - key: MANAGEMENT_HEALTH_SQS_ENABLED
        value: "false"
      - key: SERVER_PORT
        value: "10000"
      - key: SPRING_PROFILES_ACTIVE
        value: prod

  # ─────────────────────────────────────────────
