events {
    worker_connections 1024;
}

http {
    # 공통 프록시 헤더
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 로컬 CORS (개발 전용)
    add_header Access-Control-Allow-Origin  *;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
    add_header Access-Control-Allow-Headers "Authorization, Content-Type";

    # Docker 내장 DNS로 upstream 주소를 동적 재해석 (컨테이너 IP 변경 대응)
    resolver 127.0.0.11 valid=30s ipv6=off;

    server {
        listen 80;

        # OPTIONS preflight 빠른 응답
        if ($request_method = OPTIONS) {
            return 204;
        }

        # ── account-service ─────────────────────────────
        location /api/auth/ {
            proxy_pass http://service-account:8081;
        }
        location /api/users/ {
            proxy_pass http://service-account:8081;
        }

        # ── ticket-service ──────────────────────────────
        location /api/tickets/ {
            proxy_pass http://service-ticket:8082;
        }

        # ── trade-service ───────────────────────────────
        location /api/trades/ {
            proxy_pass http://service-trade:8083;
        }
        location /api/deals/ {
            proxy_pass http://service-trade:8083;
        }

        # ── chat-service (HTTP + WebSocket) ─────────────
        location /api/chat/ {
            proxy_pass http://service-chat:8084;
        }
        location /ws/ {
            proxy_pass         http://service-chat:8084;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── cs-service ──────────────────────────────────
        location /api/cs/ {
            proxy_pass http://service-cs:8085;
        }
        location /api/notices/ {
            proxy_pass http://service-cs:8085;
        }
        location /api/faqs/ {
            proxy_pass http://service-cs:8085;
        }
        location /api/inquiries/ {
            proxy_pass http://service-cs:8085;
        }
    }
}
